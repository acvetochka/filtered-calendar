name: Update calendars

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" # кожні 6 годин

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ICS_SOURCE_URL: ${{ secrets.ICS_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate calendars
        run: python run.py group3

      - name: Commit updated ICS files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/*.ics
          git diff --cached --quiet || git commit -m "Update calendars"
          git push
